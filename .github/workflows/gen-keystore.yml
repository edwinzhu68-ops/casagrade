name: Generate Keystore (run once)

on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore lottery.keystore \
            -alias lottery -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=Lottery,O=CasaGrade,C=PA" \
            -storepass lottery2024 -keypass lottery2024
          base64 -w 0 lottery.keystore > keystore.b64
          echo "=== COPY THE LINE BELOW ==="
          cat keystore.b64

      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystore-b64
          path: keystore.b64
