name: Dump Keystore (temp - delete after use)

on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > lottery.keystore
          ls -la lottery.keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" > keystore.b64
      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: merchant-keystore-dump
          path: |
            lottery.keystore
            keystore.b64
