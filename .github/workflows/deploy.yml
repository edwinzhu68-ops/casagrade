name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'

env:
  NODE_VERSION: 20

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci || npm install

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: |
            backend/dist/
            backend/package.json
            backend/package-lock.json
          retention-days: 3

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'staging' || github.event.inputs.environment == ''
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: deploy/

      - name: Deploy to staging
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "Deploying to staging environment..."
          # Configure SSH
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # rsync files to server
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            deploy/ ${DEPLOY_USER}@${DEPLOY_HOST}:/opt/lottery-system/

          # Restart service
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${DEPLOY_USER}@${DEPLOY_HOST} \
            "cd /opt/lottery-system && npm ci --production && pm2 restart lottery-backend || pm2 start dist/main.js --name lottery-backend"

          echo "Staging deployment complete!"

  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: deploy/

      - name: Deploy to production
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "Deploying to production environment..."
          # Configure SSH
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Create backup before deploy
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${DEPLOY_USER}@${DEPLOY_HOST} \
            "cd /opt/lottery-system && tar czf /opt/backups/lottery-\$(date +%Y%m%d-%H%M%S).tar.gz dist/"

          # rsync files to server
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            deploy/ ${DEPLOY_USER}@${DEPLOY_HOST}:/opt/lottery-system/

          # Install production dependencies and restart
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${DEPLOY_USER}@${DEPLOY_HOST} \
            "cd /opt/lottery-system && npm ci --production && pm2 restart lottery-backend"

          echo "Production deployment complete!"

      - name: Verify deployment
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${PRODUCTION_URL}/api/draw/latest || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed!"
          else
            echo "Warning: Health check returned status $STATUS"
            exit 1
          fi
