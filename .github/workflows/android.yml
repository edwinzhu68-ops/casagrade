name: Build & Upload APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/lottery.keystore
          echo "Keystore size: $(stat -c%s android/app/lottery.keystore) bytes"

      - name: Build signed APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Verify APK signature
        run: |
          APK=$(find android -name "*.apk" -path "*/release/*" | head -1)
          echo "APK: $APK ($(stat -c%s "$APK") bytes)"
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner verify --verbose "$APK"

      - name: Upload APK to server
        run: |
          echo "${{ secrets.SERVER_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          APK=$(find android -name "*.apk" -path "*/release/*" | head -1)
          scp -v -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            "$APK" \
            "root@${{ secrets.SERVER_HOST }}:/var/www/lottery-system/download/lottery-customer.apk"
          echo "Upload complete"
          # Verify on server
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            "root@${{ secrets.SERVER_HOST }}" \
            "ls -lh /var/www/lottery-system/download/lottery-customer.apk"
