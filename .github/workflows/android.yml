name: Build & Upload APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/lottery.keystore

      - name: Clean Gradle cache and wrapper
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper/dists

      - name: Build signed APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK to server
        run: |
          echo "${{ secrets.SERVER_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          APK=$(find android -name "*.apk" -path "*/release/*" | head -1)
          scp -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            "$APK" \
            "root@${{ secrets.SERVER_HOST }}:/var/www/lottery-system/download/lottery-merchant.apk"

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://casagrade.com/download/lottery-merchant.apk"]}' \
            | tee /tmp/cf_result.json
          cat /tmp/cf_result.json | grep -q '"success":true' && echo "Cache purged" || echo "Purge may have failed"
